<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挖地小灯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        #gameWrapper {
            background: #0f3460;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #e94560;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameUI {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #statsPanel {
            display: flex;
            gap: 30px;
            background: #16213e;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid #e94560;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-value.oxygen {
            color: #4ecdc4;
        }

        #controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #16213e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            border-left: 4px solid #e94560;
        }

        .btn:hover {
            background: #1f2a4a;
            transform: translateY(-2px);
        }

        #gameOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        #gameOverlay.show {
            display: flex;
        }

        #gameOverlay h2 {
            color: #e94560;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(233,69,96,0.5);
        }

        #gameOverlay p {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restartBtn {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #restartBtn:hover {
            background: #ff6b7f;
            transform: scale(1.05);
        }

        #instructions {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            color: #888;
            font-size: 14px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            background: #0f3460;
            padding: 5px 10px;
            border-radius: 5px;
            color: #e94560;
            font-weight: bold;
            border: 1px solid #e94560;
        }

        .warning {
            animation: warningPulse 1s infinite;
        }

        @keyframes warningPulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
        }

        #messageContainer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            z-index: 20;
            max-width: 300px;
        }
		.oxygen-tank {
			position: absolute;
			top: 10px;
			left: 10px;
			background: rgba(0, 0, 0, 0.5);
			color: white;
			border: 2px solid #4ecdc4;
			border-radius: 10px;
			padding: 8px 15px;
			display: flex;
			align-items: center;
			gap: 10px;
			z-index: 30;
			font-size: 16px;
			backdrop-filter: blur(5px);
		}

		.oxygen-tank-icon {
			font-size: 24px;
			font-weight: bold;
			color: white;
			background: #4ecdc4;
			width: 40px;
			height: 40px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			text-shadow: 0 0 5px rgba(0,0,0,0.5);
		}

		.oxygen-tank-count {
			color: white;
			font-size: 20px;
			font-weight: bold;
			margin: 0 5px;
		}

		.oxygen-tank-use {
			background: #4ecdc4;
			color: #16213e;
			border: none;
			padding: 5px 15px;
			border-radius: 20px;
			cursor: pointer;
			font-weight: bold;
			transition: all 0.3s;
			font-size: 14px;
		}

		.oxygen-tank-use:hover:not(:disabled) {
			background: #ffd700;
			transform: scale(1.05);
		}

		.oxygen-tank-use:disabled {
			background: #666;
			cursor: not-allowed;
			opacity: 0.5;
		}

		.oxygen-tank-buy {
			background: #e94560;
			color: white;
			border: none;
			padding: 5px 15px;
			border-radius: 20px;
			cursor: pointer;
			font-weight: bold;
			transition: all 0.3s;
			font-size: 14px;
			white-space: nowrap;
		}

		.oxygen-tank-buy:hover:not(:disabled) {
			background: #ff6b7f;
			transform: scale(1.05);
		}

		.oxygen-tank-buy:disabled {
			background: #666;
			cursor: not-allowed;
			opacity: 0.5;
		}

		.oxygen-tank-price {
			color: #ffd700;
			font-weight: bold;
		}
        .message {
            background: rgba(233, 69, 96, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: messageSlide 0.3s ease-out;
            border: 2px solid #ffd700;
            width: fit-content;
            max-width: 100%;
            white-space: nowrap;
        }

        @keyframes messageSlide {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .audio-control {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: all 0.3s;
        }

        .audio-control:hover {
            background: rgba(233, 69, 96, 0.8);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="messageContainer"></div>
            <button class="audio-control" id="audioControl">🔊</button>
			<div class="oxygen-tank" id="oxygenTank">
				<span class="oxygen-tank-icon">O₂</span>
				<span class="oxygen-tank-count" id="oxygenTankCount">0</span>
				<button class="oxygen-tank-use" id="useOxygenTank">使用</button>
				<button class="oxygen-tank-buy" id="buyOxygenTank">购买 <span class="oxygen-tank-price" id="oxygenTankPrice">2000</span></button>
			</div>
			<div id="gameOverlay">
				<h2>氧气耗尽</h2>
				<p>到达深度: <span id="finalDepth">0</span>m</p>
				<button id="restartBtn">重新开始</button>
			</div>
            <div id="loading" class="loading">加载资源中... <span id="loadProgress">0%</span></div>
        </div>
        
        <div id="gameUI">
            <div id="statsPanel">
                <div class="stat-item">
                    <span class="stat-label">深度</span>
                    <span class="stat-value" id="depthValue">0m</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">氧气</span>
                    <span class="stat-value oxygen" id="oxygenValue">100%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">金币</span>
                    <span class="stat-value" id="goldValue">0</span>
                </div>
            </div>
            <div id="controls">
                <button class="btn" id="newGameBtn">New Game</button>
            </div>
        </div>
        
        <div id="instructions">
            <div class="key-hint">
                <span class="key">↑ ↓ ← →</span>
                <span>移动/挖掘</span>
                <span class="key">space</span>
                <span>使用道具</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let gameOver = false;
        let gold = 0;
        let depth = 0;
        let oxygen = 100;
		// 氧气筒相关
		let oxygenTankCount = 0; // 拥有氧气筒数量
		let oxygenTankPrice = 200; // 当前价格
		let oxygenTankPurchased = 0; // 已购买次数
        // 时间相关
        let lastTimestamp = 0;
        let lastOxygenUpdate = 0;
        const OXYGEN_CONSUMPTION_RATE = 2;
        const OXYGEN_RECOVERY_RATE = 5;
        
        // 物理参数
        const GRAVITY = 0.12;
        const TERMINAL_VELOCITY = 4;
        const JUMP_FORCE = -4.5;
        const FLIGHT_FORCE = -2.2;
        const MOVE_SPEED = 4;
        
        // 地块尺寸 64x64，角色尺寸50x76
        const TILE_SIZE = 80;
        const PLAYER_SIZE_WIDTH = 50;
        const PLAYER_SIZE_HEIGHT = 76;
        
        // 边缘触发距离（3格）
        const EDGE_DISTANCE = 3 * TILE_SIZE;
        
        // 画面边界限制
        const MIN_CAMERA_Y = 0;
        const MAX_PLAYER_Y = 2 * TILE_SIZE;
        
        // 地面层数
        const GROUND_LEVEL = 6;
        
        // 音频相关 - 使用Audio对象
        let audioEnabled = true;
        let bgmAudio = null;
        let wjAudio = null;
        let ksAudio = null;
        let loadingComplete = false;
        let loadedCount = 0;
        const totalToLoad = 8; // 5张图片 + 3个音频
        
        // 消息系统
        let messages = [];
        
        // 世界地图
        let worldMap = new Map();
        
        // 玩家状态
        let player = {
            x: 10 * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE_WIDTH) / 2,
            y: (GROUND_LEVEL - 1) * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE_HEIGHT) / 2,
            vx: 0,
            vy: 0,
            onGround: true,
            direction: 'static',
            animationFrame: 0,
            animationSpeed: 0.2,
            collider: {
                width: PLAYER_SIZE_WIDTH - 4,
                height: PLAYER_SIZE_HEIGHT - 4
            }
        };
        
        // 按键状态
        let keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };
        
        // 相机偏移
        let camera = {
            x: player.x - 400 + PLAYER_SIZE_WIDTH / 2,
            y: player.y - 300 + PLAYER_SIZE_HEIGHT / 2,
            targetX: player.x - 400 + PLAYER_SIZE_WIDTH / 2,
            targetY: player.y - 300 + PLAYER_SIZE_HEIGHT / 2
        };
        
        // 图片对象
        const playerImages = {
            static: new Image(),
            up: new Image(),
            down: new Image(),
            left: new Image(),
            right: new Image()
        };

        // 设置图片路径（sc文件夹下）
        playerImages.static.src = 'sc/tomiri_static.png';
        playerImages.up.src = 'sc/tomori_up.png';
        playerImages.down.src = 'sc/tomori_down.png';
        playerImages.left.src = 'sc/tomori_left.png';
        playerImages.right.src = 'sc/tomori_right.png';

        // 初始化音频
        function initAudio() {
            try {
                // 创建音频对象
                bgmAudio = new Audio('sc/bgm.mp3');
                wjAudio = new Audio('sc/wj.mp3');
                ksAudio = new Audio('sc/ks.mp3');
                
                // 设置背景音乐循环
                bgmAudio.loop = true;
                
                // 预加载音频
                bgmAudio.preload = 'auto';
                wjAudio.preload = 'auto';
                ksAudio.preload = 'auto';
                
                // 音频加载事件
                bgmAudio.addEventListener('canplaythrough', resourceLoaded);
                wjAudio.addEventListener('canplaythrough', resourceLoaded);
                ksAudio.addEventListener('canplaythrough', resourceLoaded);
                
                // 加载失败也继续
                bgmAudio.addEventListener('error', resourceLoaded);
                wjAudio.addEventListener('error', resourceLoaded);
                ksAudio.addEventListener('error', resourceLoaded);
                
            } catch (error) {
                console.warn('音频初始化失败', error);
                // 即使失败也标记为加载完成
                for (let i = 0; i < 3; i++) resourceLoaded();
            }
        }

        // 图片加载计数
        function imageLoaded() {
            resourceLoaded();
        }

        // 资源加载完成计数
        function resourceLoaded() {
            loadedCount++;
            updateLoadProgress();
            
            // 所有资源加载完成后隐藏loading
            if (loadedCount >= totalToLoad) {
                document.getElementById('loading').style.display = 'none';
                loadingComplete = true;
            }
        }

        // 为所有图片添加加载事件
        playerImages.static.onload = imageLoaded;
        playerImages.up.onload = imageLoaded;
        playerImages.down.onload = imageLoaded;
        playerImages.left.onload = imageLoaded;
        playerImages.right.onload = imageLoaded;

        // 图片加载失败也计数
        playerImages.static.onerror = (e) => {
            console.warn('图片加载失败，使用备选绘制');
            // 如果图片加载失败，使用备选绘制
            playerImages.static.src = createFallbackImage('#e94560', 'static');
            resourceLoaded();
        };
        
        playerImages.up.onerror = (e) => {
            playerImages.up.src = createFallbackImage('#e94560', 'up');
            resourceLoaded();
        };
        
        playerImages.down.onerror = (e) => {
            playerImages.down.src = createFallbackImage('#e94560', 'down');
            resourceLoaded();
        };
        
        playerImages.left.onerror = (e) => {
            playerImages.left.src = createFallbackImage('#e94560', 'left');
            resourceLoaded();
        };
        
        playerImages.right.onerror = (e) => {
            playerImages.right.src = createFallbackImage('#e94560', 'right');
            resourceLoaded();
        };
        
        // 备选图片绘制函数
        function createFallbackImage(color, direction) {
            const canvas = document.createElement('canvas');
            canvas.width = PLAYER_SIZE_WIDTH;
            canvas.height = PLAYER_SIZE_HEIGHT;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, PLAYER_SIZE_WIDTH, PLAYER_SIZE_HEIGHT);
            
            ctx.fillStyle = 'white';
            ctx.fillRect(10, 15, 8, 8);
            ctx.fillRect(32, 15, 8, 8);
            
            ctx.fillStyle = 'black';
            ctx.fillRect(13, 18, 4, 4);
            
            ctx.fillStyle = 'black';
            if (direction === 'right') {
                ctx.fillRect(35, 18, 4, 4);
                ctx.fillRect(35, 45, 10, 5);
            } else if (direction === 'left') {
                ctx.fillRect(35, 18, 4, 4);
                ctx.fillRect(5, 45, 10, 5);
            } else if (direction === 'up') {
                ctx.fillRect(35, 18, 4, 4);
                ctx.fillRect(20, 55, 10, 5);
            } else if (direction === 'down') {
                ctx.fillRect(35, 18, 4, 4);
                ctx.fillRect(20, 45, 10, 10);
            } else {
                ctx.fillRect(35, 18, 4, 4);
                ctx.fillRect(15, 55, 20, 5);
            }
            
            return canvas.toDataURL();
        }

        // 更新加载进度
        function updateLoadProgress() {
            const progress = Math.floor(loadedCount / totalToLoad * 100);
            document.getElementById('loadProgress').textContent = progress + '%';
        }

        // 播放音效
        function playSound(audio) {
            if (!audioEnabled || !audio) return;
            
            try {
                // 克隆音频对象以允许重叠播放
                const sound = audio.cloneNode();
                sound.volume = 0.5;
                sound.play().catch(e => console.log('音频播放失败:', e));
            } catch (error) {
                console.warn('播放音效失败', error);
            }
        }

        // 播放背景音乐
        function playBGM() {
            if (!audioEnabled || !bgmAudio) return;
            
            try {
                bgmAudio.volume = 0.3;
                bgmAudio.play().catch(e => console.log('背景音乐播放失败:', e));
            } catch (error) {
                console.warn('播放背景音乐失败', error);
            }
        }

        // 停止背景音乐
        function stopBGM() {
            if (bgmAudio) {
                bgmAudio.pause();
                bgmAudio.currentTime = 0;
            }
        }

        // 显示消息
        function showMessage(text, duration = 2000) {
            const messageContainer = document.getElementById('messageContainer');
            
            // 如果已有3条消息，删除最早的一条
            if (messageContainer.children.length >= 3) {
                messageContainer.removeChild(messageContainer.children[0]);
            }
            
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.textContent = text;
            
            messageContainer.appendChild(messageElement);
            
            setTimeout(() => {
                messageElement.style.opacity = '0';
                messageElement.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    if (messageContainer.contains(messageElement)) {
                        messageContainer.removeChild(messageElement);
                    }
                }, 300);
            }, duration);
        }
		// 使用氧气筒
		function useOxygenTank() {
			if (!gameRunning || gameOver) return;
			
			if (oxygenTankCount > 0) {
				oxygenTankCount--;
				oxygen = Math.min(100, oxygen + 20);
				showMessage(`使用氧气筒 +20 氧气`, 1500);
				updateOxygenTankUI();
				playSound(ksAudio); // 复用矿石音效作为使用提示
			}
		}

		// 购买氧气筒
		function buyOxygenTank() {
			if (!gameRunning || gameOver) return;
			
			if (gold >= oxygenTankPrice) {
				gold -= oxygenTankPrice;
				oxygenTankCount++;
				oxygenTankPurchased++;
				
				// 每买3个价格上升2000
				if (oxygenTankPurchased % 3 === 0) {
					oxygenTankPrice += 2000;
				}
				
				updateOxygenTankUI();
				showMessage(`购买氧气筒 -${oxygenTankPrice} 金币`, 1500);
				playSound(ksAudio); // 复用矿石音效作为购买提示
				
				// 更新金币显示
				document.getElementById('goldValue').textContent = gold;
			} else {
				showMessage(`金币不足！需要 ${oxygenTankPrice} 金币`, 1500);
			}
		}

		// 更新道具UI
		function updateOxygenTankUI() {
			document.getElementById('oxygenTankCount').textContent = oxygenTankCount;
			document.getElementById('oxygenTankPrice').textContent = oxygenTankPrice;
			
			const useButton = document.getElementById('useOxygenTank');
			const buyButton = document.getElementById('buyOxygenTank');
			
			useButton.disabled = oxygenTankCount <= 0;
			buyButton.disabled = gold < oxygenTankPrice;
		}
        // 矿石类型配置
        const ORES = {
            COPPER: { color: '#b87333', gold: 10, rarity: 0.3, name: '铜矿' },
            IRON: { color: '#a19d94', gold: 20, rarity: 0.2, name: '铁矿' },
            GOLD: { color: '#ffd700', gold: 50, rarity: 0.1, name: '金矿' },
            DIAMOND: { color: '#b9f2ff', gold: 100, rarity: 0.05, name: '钻石' }
        };

        // 获取地块的世界坐标
        function getTileKey(tileX, tileY) {
            return `${tileX},${tileY}`;
        }
        
        // 生成新地块
        function generateTile(tileX, tileY) {
            const key = getTileKey(tileX, tileY);
            
            if (tileY < GROUND_LEVEL) {
                worldMap.set(key, { type: 'air', ore: null });
                return;
            }
            
            const isStone = Math.random() < 0.25;
            
            if (isStone) {
                worldMap.set(key, { type: 'stone', ore: null });
            } else {
                const depthValue = tileY - GROUND_LEVEL;
                const depthBonus = Math.min(1, depthValue / 50);
                
                const rand = Math.random();
                let oreType = null;
                
                if (rand < ORES.DIAMOND.rarity * (1 + depthBonus)) {
                    oreType = 'DIAMOND';
                } else if (rand < ORES.DIAMOND.rarity + ORES.GOLD.rarity * (1 + depthBonus * 0.5)) {
                    oreType = 'GOLD';
                } else if (rand < ORES.DIAMOND.rarity + ORES.GOLD.rarity + ORES.IRON.rarity) {
                    oreType = 'IRON';
                } else if (rand < ORES.DIAMOND.rarity + ORES.GOLD.rarity + ORES.IRON.rarity + ORES.COPPER.rarity) {
                    oreType = 'COPPER';
                }
                
                worldMap.set(key, { type: 'dirt', ore: oreType });
            }
        }
        
        // 获取地块
        function getTile(tileX, tileY) {
            const key = getTileKey(tileX, tileY);
            if (!worldMap.has(key)) {
                generateTile(tileX, tileY);
            }
            return worldMap.get(key);
        }
        
        // 获取角色占用的所有地块
        function getOccupiedTiles(x, y) {
            const tiles = [];
            const left = x + (PLAYER_SIZE_WIDTH - player.collider.width) / 2;
            const top = y + (PLAYER_SIZE_HEIGHT - player.collider.height) / 2;
            const right = left + player.collider.width;
            const bottom = top + player.collider.height;
            
            const startTileX = Math.floor(left / TILE_SIZE);
            const startTileY = Math.floor(top / TILE_SIZE);
            const endTileX = Math.floor((right - 1) / TILE_SIZE);
            const endTileY = Math.floor((bottom - 1) / TILE_SIZE);
            
            for (let ty = startTileY; ty <= endTileY; ty++) {
                for (let tx = startTileX; tx <= endTileX; tx++) {
                    if (ty >= 0) {
                        tiles.push({ x: tx, y: ty });
                    }
                }
            }
            
            return tiles;
        }
        
        // 检查碰撞
        function checkCollision(x, y) {
            const tiles = getOccupiedTiles(x, y);
            
            for (const tile of tiles) {
                const tileData = getTile(tile.x, tile.y);
                if (tileData.type !== 'air') {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查脚下是否有支撑
        function checkGround(x, y) {
            const left = x + (PLAYER_SIZE_WIDTH - player.collider.width) / 2;
            const right = left + player.collider.width;
            const bottom = y + (PLAYER_SIZE_HEIGHT - player.collider.height) / 2 + player.collider.height;
            
            const startTileX = Math.floor(left / TILE_SIZE);
            const endTileX = Math.floor((right - 1) / TILE_SIZE);
            const groundTileY = Math.floor(bottom / TILE_SIZE);
            
            for (let tx = startTileX; tx <= endTileX; tx++) {
                const tileData = getTile(tx, groundTileY);
                if (tileData.type !== 'air') {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查头顶是否有障碍
        function checkCeiling(x, y) {
            const left = x + (PLAYER_SIZE_WIDTH - player.collider.width) / 2;
            const right = left + player.collider.width;
            const top = y + (PLAYER_SIZE_HEIGHT - player.collider.height) / 2;
            
            const startTileX = Math.floor(left / TILE_SIZE);
            const endTileX = Math.floor((right - 1) / TILE_SIZE);
            const ceilingTileY = Math.floor(top / TILE_SIZE);
            
            if (ceilingTileY < 0) return false;
            
            for (let tx = startTileX; tx <= endTileX; tx++) {
                const tileData = getTile(tx, ceilingTileY);
                if (tileData.type !== 'air') {
                    return true;
                }
            }
            
            return false;
        }
        
		// 检查左右是否有障碍
		function checkSide(x, y, direction) {
			const centerY = y + PLAYER_SIZE_HEIGHT / 2;
			let checkX;
			
			if (direction === 'left') {
				checkX = x - 1; // 稍微向左偏移一点
			} else {
				checkX = x + PLAYER_SIZE_WIDTH + 1; // 稍微向右偏移一点
			}
			
			const tileX = Math.floor(checkX / TILE_SIZE);
			const tileY = Math.floor(centerY / TILE_SIZE);
			
			if (tileY < 0) return true;
			
			const tileData = getTile(tileX, tileY);
			return tileData.type !== 'air';
		}
        
        // 根据按键状态更新玩家输入
        function handleInput() {
            if (!gameRunning || gameOver) return;
            
            // 处理垂直方向
            if (keys.ArrowUp) {
                if (player.onGround) {
                    player.vy = JUMP_FORCE;
                    player.onGround = false;
                } else if (player.vy > -2) {
                    player.vy = Math.max(player.vy + FLIGHT_FORCE, JUMP_FORCE);
                }
            }
            
            // 处理水平移动和挖掘
            if (keys.ArrowLeft && !keys.ArrowRight) {
                if (!checkSide(player.x, player.y, 'left')) {
                    player.vx = -MOVE_SPEED;
                } else {
                    tryDigHorizontal('left');
                }
            } else if (keys.ArrowRight && !keys.ArrowLeft) {
                if (!checkSide(player.x, player.y, 'right')) {
                    player.vx = MOVE_SPEED;
                } else {
                    tryDigHorizontal('right');
                }
            }
            
            // 处理向下挖掘
            if (keys.ArrowDown) {
                tryDigVertical('down');
            }
            
            // 根据速度设置方向
            if (player.vx < -0.1) {
                player.direction = 'left';
            } else if (player.vx > 0.1) {
                player.direction = 'right';
            } else if (player.vy < -0.1) {
                player.direction = 'up';
            } else if (player.vy > 0.1) {
                player.direction = 'down';
            } else {
                player.direction = 'static';
            }
        }
        
		// 水平挖掘
		function tryDigHorizontal(direction) {
			const centerX = player.x + PLAYER_SIZE_WIDTH / 2;
			const centerY = player.y + PLAYER_SIZE_HEIGHT / 2;
			
			let digX;
			if (direction === 'left') {
				digX = player.x - 2; // 检测角色左边缘稍微靠外
			} else {
				digX = player.x + PLAYER_SIZE_WIDTH + 2; // 检测角色右边缘稍微靠外
			}
			
			const tileX = Math.floor(digX / TILE_SIZE);
			const tileY = Math.floor(centerY / TILE_SIZE);
			
			if (tileY < 0) return;
			
			const tile = getTile(tileX, tileY);
			
			if (tile.type === 'stone') {
				player.animationFrame = 0.5;
				return;
			}
			
			if (tile.type === 'dirt') {
				// 播放挖掘音效
				playSound(wjAudio);
				
				if (tile.ore) {
					const ore = ORES[tile.ore];
					gold += ore.gold;
					
					// 播放矿石音效和显示消息
					playSound(ksAudio);
					showMessage(`+${ore.gold} (${ore.name})`);
				}
				
				worldMap.set(getTileKey(tileX, tileY), { type: 'air', ore: null });
				
				if (direction === 'left') {
					player.vx = -MOVE_SPEED * 0.5;
				} else {
					player.vx = MOVE_SPEED * 0.5;
				}
			}
		}
		// 垂直挖掘
		function tryDigVertical(direction) {
			const centerX = player.x + PLAYER_SIZE_WIDTH / 2;
			const centerY = player.y + PLAYER_SIZE_HEIGHT / 2;
			
			let digY;
			if (direction === 'down') {
				digY = player.y + PLAYER_SIZE_HEIGHT + 2; // 检测角色底部稍微靠下
			} else {
				digY = player.y - 2; // 检测角色顶部稍微靠上
			}
			
			const tileX = Math.floor(centerX / TILE_SIZE);
			const tileY = Math.floor(digY / TILE_SIZE);
			
			if (tileY < 0) return;
			
			const tile = getTile(tileX, tileY);
			
			if (tile.type === 'stone') {
				player.animationFrame = 0.5;
				return;
			}
			
			if (tile.type === 'dirt') {
				// 播放挖掘音效
				playSound(wjAudio);
				
				if (tile.ore) {
					const ore = ORES[tile.ore];
					gold += ore.gold;
					
					// 播放矿石音效和显示消息
					playSound(ksAudio);
					showMessage(`+${ore.gold} (${ore.name})`);
				}
				
				worldMap.set(getTileKey(tileX, tileY), { type: 'air', ore: null });
				
				if (direction === 'down') {
					player.vy = -1.2;
				}
			}
			
			if (tile.type === 'air' && direction === 'down') {
				player.vy = MOVE_SPEED * 0.6;
			}
		}
        // 更新物理
        function updatePhysics() {
            if (!gameRunning || gameOver) return;
            
            handleInput();
            
            const oldX = player.x;
            const oldY = player.y;
            
            player.vy += GRAVITY;
            
            if (player.vy > TERMINAL_VELOCITY) {
                player.vy = TERMINAL_VELOCITY;
            }
            
            if (player.y < MAX_PLAYER_Y) {
                player.y = MAX_PLAYER_Y;
                player.vy = 0;
            }
            
            if (player.vy !== 0) {
                const step = Math.sign(player.vy);
                const stepSize = Math.min(Math.abs(player.vy), 1);
                const steps = Math.ceil(Math.abs(player.vy));
                
                for (let i = 0; i < steps; i++) {
                    player.y += step * stepSize;
                    
                    if (player.vy > 0) {
                        if (checkGround(player.x, player.y)) {
                            player.y = oldY + step * i * stepSize;
                            player.vy = 0;
                            break;
                        }
                    } else {
                        if (checkCeiling(player.x, player.y)) {
                            player.y = oldY + step * i * stepSize;
                            player.vy = 0;
                            break;
                        }
                    }
                }
            }
            
            if (player.vx !== 0) {
                const step = Math.sign(player.vx);
                const stepSize = Math.min(Math.abs(player.vx), 1.5);
                const steps = Math.ceil(Math.abs(player.vx));
                
                for (let i = 0; i < steps; i++) {
                    player.x += step * stepSize;
                    
                    if (checkCollision(player.x, player.y)) {
                        player.x -= step * stepSize;
                        player.vx = 0;
                        break;
                    }
                }
            }
            
            player.onGround = checkGround(player.x, player.y);
            
            player.vx *= 0.9;
            if (Math.abs(player.vx) < 0.1) {
                player.vx = 0;
            }
            
            const centerY = player.y + PLAYER_SIZE_HEIGHT / 2;
            const groundLine = GROUND_LEVEL * TILE_SIZE;
            const currentDepth = Math.max(0, Math.floor((centerY - groundLine) / TILE_SIZE) + 1);
            depth = Math.max(depth, currentDepth);
        }
        
        // 更新相机
        function updateCamera() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            
            const leftEdge = EDGE_DISTANCE;
            const rightEdge = 800 - PLAYER_SIZE_WIDTH - EDGE_DISTANCE;
            const topEdge = EDGE_DISTANCE;
            const bottomEdge = 600 - PLAYER_SIZE_HEIGHT - EDGE_DISTANCE;
            
            if (screenX < leftEdge) {
                camera.targetX = player.x - leftEdge;
            } else if (screenX > rightEdge) {
                camera.targetX = player.x - rightEdge;
            }
            
            if (screenY < topEdge) {
                camera.targetY = player.y - topEdge;
            } else if (screenY > bottomEdge) {
                camera.targetY = player.y - bottomEdge;
            }
            
            if (camera.targetY < MIN_CAMERA_Y) {
                camera.targetY = MIN_CAMERA_Y;
            }
            
            const cameraSpeed = 0.15;
            camera.x += (camera.targetX - camera.x) * cameraSpeed;
            camera.y += (camera.targetY - camera.y) * cameraSpeed;
        }
        
        // 更新氧气
        function updateOxygen(deltaTime) {
            if (!gameRunning || gameOver) return;
            
            const secondsPassed = deltaTime / 1000;
            
            const centerY = player.y + PLAYER_SIZE_HEIGHT / 2;
            const groundLine = GROUND_LEVEL * TILE_SIZE;
            
            if (centerY < groundLine) {
                oxygen = Math.min(100, oxygen + OXYGEN_RECOVERY_RATE * secondsPassed);
            } else {
                oxygen = Math.max(0, oxygen - OXYGEN_CONSUMPTION_RATE * secondsPassed);
                
                if (oxygen <= 0) {
                    oxygen = 0;
                    gameOver = true;
                    gameRunning = false;
                    showGameOver();
                }
            }
        }
        
        // 渲染游戏
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            updatePhysics();
            updateCamera();
            
            player.animationFrame += player.animationSpeed;
            if (player.animationFrame > 1) {
                player.animationFrame = 0;
            }
            
            const startTileX = Math.floor(camera.x / TILE_SIZE) - 2;
            const startTileY = Math.floor(camera.y / TILE_SIZE) - 2;
            const endTileX = Math.ceil((camera.x + 800) / TILE_SIZE) + 2;
            const endTileY = Math.ceil((camera.y + 600) / TILE_SIZE) + 2;
            
            for (let tileY = startTileY; tileY <= endTileY; tileY++) {
                for (let tileX = startTileX; tileX <= endTileX; tileX++) {
                    if (tileY < 0) continue;
                    
                    const tile = getTile(tileX, tileY);
                    const screenX = tileX * TILE_SIZE - camera.x;
                    const screenY = tileY * TILE_SIZE - camera.y;
                    
                    if (screenX + TILE_SIZE < 0 || screenX > 800 || screenY + TILE_SIZE < 0 || screenY > 600) {
                        continue;
                    }
                    
                    if (tile.type === 'stone') {
                        ctx.fillStyle = '#4a4a4a';
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        
                        ctx.fillStyle = '#6a6a6a';
                        ctx.beginPath();
                        ctx.arc(screenX + 16, screenY + 16, 8, 0, Math.PI * 2);
                        ctx.arc(screenX + 48, screenY + 48, 10, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (tile.type === 'dirt') {
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        
                        ctx.fillStyle = '#6b4a1b';
                        ctx.fillRect(screenX + 12, screenY + 12, 10, 10);
                        ctx.fillRect(screenX + 40, screenY + 32, 12, 12);
                        
                        if (tile.ore) {
                            const ore = ORES[tile.ore];
                            
                            const glowIntensity = 0.8 + 0.2 * Math.sin(Date.now() * 0.005);
                            ctx.shadowColor = ore.color;
                            ctx.shadowBlur = 18 * glowIntensity;
                            
                            ctx.fillStyle = ore.color;
                            ctx.beginPath();
                            ctx.arc(screenX + TILE_SIZE/2, screenY + TILE_SIZE/2, 18, 0, Math.PI*2);
                            ctx.fill();
                            
                            ctx.shadowBlur = 0;
                            ctx.fillStyle = 'white';
                            ctx.beginPath();
                            ctx.arc(screenX + TILE_SIZE/2 - 6, screenY + TILE_SIZE/2 - 6, 5, 0, Math.PI*2);
                            ctx.fill();
                        }
                    } else if (tile.type === 'air') {
                        if (tileY < GROUND_LEVEL) {
                            const gradient = ctx.createLinearGradient(screenX, screenY, screenX, screenY + TILE_SIZE);
                            gradient.addColorStop(0, '#87CEEB');
                            gradient.addColorStop(1, '#98D8E8');
                            ctx.fillStyle = gradient;
                        } else {
                            const darkness = Math.min(1, (tileY - GROUND_LEVEL) / 30);
                            const darkColor = `rgb(${Math.floor(30 + 20 * darkness)}, ${Math.floor(30 + 20 * darkness)}, ${Math.floor(40 + 20 * darkness)})`;
                            ctx.fillStyle = darkColor;
                        }
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            
            // 绘制画面上边界
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(0, MAX_PLAYER_Y - camera.y);
            ctx.lineTo(800, MAX_PLAYER_Y - camera.y);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 渲染玩家
            const playerScreenX = player.x - camera.x;
            const playerScreenY = player.y - camera.y;
            
            let playerImage = playerImages[player.direction] || playerImages.static;
            
            if (!player.onGround && Math.abs(player.vy) > 0.1) {
                ctx.save();
                ctx.translate(playerScreenX + PLAYER_SIZE_WIDTH / 2, playerScreenY + PLAYER_SIZE_HEIGHT / 2);
                ctx.rotate(player.vy * 0.008);
                ctx.drawImage(playerImage, -PLAYER_SIZE_WIDTH / 2, -PLAYER_SIZE_HEIGHT / 2, PLAYER_SIZE_WIDTH, PLAYER_SIZE_HEIGHT);
                ctx.restore();
            } else {
                ctx.drawImage(playerImage, playerScreenX, playerScreenY, PLAYER_SIZE_WIDTH, PLAYER_SIZE_HEIGHT);
            }
            
            document.getElementById('depthValue').textContent = depth + 'm';
            document.getElementById('oxygenValue').textContent = Math.floor(oxygen) + '%';
            document.getElementById('goldValue').textContent = gold;
            
            const oxygenElement = document.getElementById('oxygenValue');
            if (oxygen < 30) {
                oxygenElement.style.color = '#ff4444';
                oxygenElement.classList.add('warning');
            } else if (oxygen < 60) {
                oxygenElement.style.color = '#ffaa44';
                oxygenElement.classList.remove('warning');
            } else {
                oxygenElement.style.color = '#4ecdc4';
                oxygenElement.classList.remove('warning');
            }

			const buyButton = document.getElementById('buyOxygenTank');
			if (buyButton) {
				buyButton.disabled = gold < oxygenTankPrice;
			}
			const useButton = document.getElementById('useOxygenTank');
			if (useButton) {
				useButton.disabled = oxygenTankCount <= 0;
			}
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning || gameOver) {
                render();
                return;
            }
            
            if (lastTimestamp === 0) {
                lastTimestamp = timestamp;
            }
            const deltaTime = timestamp - lastTimestamp;
            
            updateOxygen(deltaTime);
            render();
            
            lastTimestamp = timestamp;
            requestAnimationFrame(gameLoop);
        }
        
		function showGameOver() {
			document.getElementById('finalDepth').textContent = depth;
			document.getElementById('gameOverlay').classList.add('show');
			stopBGM();
			render();
		}
        
        function hideGameOver() {
            document.getElementById('gameOverlay').classList.remove('show');
        }
        
        function newGame() {
            gameRunning = true;
            gameOver = false;
            gold = 0;
            depth = 0;
            oxygen = 100;
            lastTimestamp = 0;
            
            worldMap.clear();
			oxygenTankCount = 0;
			oxygenTankPrice = 200;
			oxygenTankPurchased = 0;
			updateOxygenTankUI();
            player = {
                x: 10 * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE_WIDTH) / 2,
                y: (GROUND_LEVEL - 1) * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE_HEIGHT) / 2,
                vx: 0,
                vy: 0,
                onGround: true,
                direction: 'static',
                animationFrame: 0,
                animationSpeed: 0.2,
                collider: {
                    width: PLAYER_SIZE_WIDTH - 4,
                    height: PLAYER_SIZE_HEIGHT - 4
                }
            };
            
            camera = {
                x: player.x - 400 + PLAYER_SIZE_WIDTH / 2,
                y: player.y - 300 + PLAYER_SIZE_HEIGHT / 2,
                targetX: player.x - 400 + PLAYER_SIZE_WIDTH / 2,
                targetY: player.y - 300 + PLAYER_SIZE_HEIGHT / 2
            };
            
            for (let y = GROUND_LEVEL - 2; y <= GROUND_LEVEL + 15; y++) {
                for (let x = 5; x <= 15; x++) {
                    getTile(x, y);
                }
            }
            
            
            hideGameOver();
            requestAnimationFrame(gameLoop);
        }
        
        // 键盘事件 - 添加一个标志记录是否已经播放过音乐
        let bgmStarted = false;

		document.addEventListener('keydown', (e) => {
			if (!gameRunning || gameOver) return;
			
			// 用户第一次按键时播放背景音乐
			if (!bgmStarted && audioEnabled && bgmAudio && loadingComplete) {
				bgmStarted = true;
				playBGM();
			}
			
			if (e.code === 'Space') {
				e.preventDefault();
				useOxygenTank();
			}
			
			if (e.key in keys) {
				e.preventDefault();
				keys[e.key] = true;
			}
		});
        
        document.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                e.preventDefault();
                keys[e.key] = false;
            }
        });
        
        // 音频控制按钮
        document.getElementById('audioControl').addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            const btn = document.getElementById('audioControl');
            btn.textContent = audioEnabled ? '🔊' : '🔇';
            
            if (audioEnabled && bgmAudio) {
                playBGM();
            } else if (bgmAudio) {
                stopBGM();
            }
        });
        // 按钮事件
		document.getElementById('useOxygenTank').addEventListener('click', useOxygenTank);
		document.getElementById('buyOxygenTank').addEventListener('click', buyOxygenTank);
        document.getElementById('newGameBtn').addEventListener('click', newGame);
        document.getElementById('restartBtn').addEventListener('click', newGame);
        
        // 初始化音频
        initAudio();
        
        // 初始化游戏
        newGame();
    </script>
</body>
